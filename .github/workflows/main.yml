name: CI/CD

on:
  push:
    branches: ["dev"]
  pull_request:
    branches: ["dev"]

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout del código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Frontend
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint frontend
        run: |
          cd frontend
          npm run lint || echo "::warning::Lint detectó observaciones (no bloqueante en dev)."

      - name: Run frontend tests
        run: |
          cd frontend
          npm test -- --run || echo "::warning::No hay tests unitarios aún. CI continúa en fase de desarrollo."

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      # Backend
      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Run backend tests
        run: |
          cd backend
          npm test || echo "No backend tests yet."

      # Build Docker

      - name: Build Docker images
        run: docker build - t fullstack-app .

      - name: Start containers
        run: docker-compose up -d

      - name: Wait for services
        run: sleep 20

      - name: Test API health
        run: |
          curl --fail http://localhost:5000 || exit 1

      - name: Stop containers
        run: docker compose down
